name: Release

# Two ways to cut a release:
#   1. Push a tag directly:  git tag v1.1.0 && git push origin v1.1.0
#   2. Actions tab -> Release -> Run workflow -> enter the version (e.g. 1.1.0
#      or v1.1.0). Runs against main and creates+pushes the tag for you.
# Either way the tag's version must already match CFBundleShortVersionString
# in Resources/Info.plist (bump that in a normal PR first) — the workflow
# fails loudly if they're out of sync rather than releasing the wrong build.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 1.1.1 or v1.1.1 (must match Info.plist)"
        required: true
        type: string

# Needs write access to create the tag (dispatch path), the release, and upload the asset.
permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ inputs.version }}"
            tag="v${raw#v}"
          else
            tag="${{ github.ref_name }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Info.plist version
        run: |
          plist_version=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Resources/Info.plist)
          tag_version="${{ steps.tag.outputs.tag }}"
          tag_version="${tag_version#v}"
          if [ "$plist_version" != "$tag_version" ]; then
            echo "::error::Tag version ($tag_version) doesn't match Resources/Info.plist CFBundleShortVersionString ($plist_version). Bump the plist in a PR first, merge it, then release that version."
            exit 1
          fi

      # Only the dispatch path needs a tag created — a tag push already has one.
      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag already exists on origin."
            exit 1
          fi
          git tag "$tag"
          git push origin "$tag"

      # Ad-hoc signed (no Developer ID): the in-app updater downloads this and
      # reveals it in Finder for manual install.
      - name: Build app (ad-hoc signed)
        run: CCUSAGEBAR_ADHOC_SIGN=1 bash scripts/build-app.sh

      - name: Assert bundle is executable
        run: test -x CCUsageBar.app/Contents/MacOS/CCUsageBar

      # ditto preserves the bundle structure + signature inside the zip.
      - name: Zip app
        run: ditto -c -k --keepParent CCUsageBar.app CCUsageBar.app.zip

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            CCUsageBar.app.zip \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes
